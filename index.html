<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:-apple-system; background:#0f0f0f; color:#fff; display:flex; flex-direction:column; height:100vh; }
#chat { flex:1; overflow:auto; padding:10px; }
.msg { padding:10px; margin:5px 0; border-radius:10px; white-space:pre-wrap; }
.user { background:#1e1e1e; }
.ai { background:#2a2a2a; }
textarea { width:100%; background:#111; color:#fff; border:none; padding:10px; resize:none; }
button { width:100%; padding:10px; background:#10a37f; border:none; color:#fff; }
iframe { height:40%; border:none; }
</style>
</head>

<body>

<div id="chat"></div>

<textarea id="prompt" placeholder="Напиши сайт или измени код..."></textarea>
<button onclick="send()">Generate</button>

<iframe id="preview"></iframe>

<script>
let chatHistory = [];

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView();
}

async function send() {
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) return;

  addMessage(prompt, "user");
  document.getElementById("prompt").value = "";

  chatHistory.push({ role: "user", content: prompt });

  const context = chatHistory.map(m => `${m.role}: ${m.content}`).join("\n");

  try {
    // ⚠️ публичный прокси (может иногда работать нестабильно)
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://text.pollinations.ai/" + encodeURIComponent(
      "You are a frontend developer. Modify or generate full HTML.\n" + context
    )));

    const output = await res.text();

    addMessage(output, "ai");
    chatHistory.push({ role: "ai", content: output });

    // live preview
    document.getElementById("preview").srcdoc = output;

  } catch (e) {
    addMessage("Ошибка: " + e.message, "ai");
  }
}
</script>

</body>
</html>
