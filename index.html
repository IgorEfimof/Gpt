<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background:#111; color:#fff; font-family:sans-serif; }
textarea { width:100%; height:80px; }
button { width:100%; padding:10px; }
iframe { width:100%; height:300px; border:none; }
</style>
</head>

<body>

<h3>AI Builder (Free)</h3>

<textarea id="prompt"></textarea>
<button onclick="gen()">Generate</button>

<pre id="out"></pre>
<iframe id="frame"></iframe>

<script>
async function gen() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch("https://api-inference.huggingface.co/models/bigcode/starcoder", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      inputs: "Write HTML page: " + prompt
    })
  });

  const data = await res.json();

  const code = data[0]?.generated_text || "Error";

  document.getElementById("out").innerText = code;
  document.getElementById("frame").srcdoc = code;
}
</script>

</body>
</html>
