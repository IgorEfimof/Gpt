<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>My AI Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #0f0f0f;
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
}

.user { background: #1e1e1e; }
.ai { background: #2a2a2a; }

#inputArea {
  display: flex;
  border-top: 1px solid #333;
}

textarea {
  flex: 1;
  padding: 10px;
  background: #111;
  color: white;
  border: none;
  resize: none;
}

button {
  padding: 10px;
  background: #10a37f;
  border: none;
  color: white;
  cursor: pointer;
}

iframe {
  height: 40%;
  border: none;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="prompt" placeholder="Напиши сайт..."></textarea>
  <button onclick="send()">▶</button>
</div>

<iframe id="preview"></iframe>

<script>
const API_KEY = "PASTE_YOUR_API_KEY_HERE";

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView();
}

async function send() {
  const prompt = document.getElementById("prompt").value;
  if (!prompt) return;

  addMessage(prompt, "user");
  document.getElementById("prompt").value = "";

  const res = await fetch("https://api.openai.com/v1/responses", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-5.3",
      input: [
        {
          role: "system",
          content: "You are a frontend expert. Return ONLY pure HTML code with CSS and JS inside. No explanations."
        },
        {
          role: "user",
          content: prompt
        }
      ]
    })
  });

  const data = await res.json();
  const output = data.output[0].content[0].text;

  addMessage(output, "ai");

  // live preview
  document.getElementById("preview").srcdoc = output;
}
</script>

</body>
</html>
