<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Code Editor with Memory</title>
<style>
body { margin:0; font-family:-apple-system; background:#111; color:#fff; display:flex; flex-direction:column; height:100vh; }
#chat { flex:1; overflow-y:auto; padding:10px; }
.msg { padding:10px; margin:5px 0; border-radius:10px; word-break:break-word; }
.user { background:#1e1e1e; }
.ai { background:#2a2a2a; }
#inputArea { display:flex; border-top:1px solid #333; }
textarea { flex:1; padding:10px; background:#111; color:white; border:none; resize:none; }
button { padding:10px; background:#10a37f; border:none; color:white; cursor:pointer; }
iframe { height:40%; border:none; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="prompt" placeholder="Напиши код или правку..."></textarea>
  <button onclick="send()">▶</button>
</div>

<iframe id="preview"></iframe>

<script>
const chatHistory = [];

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView();
}

// Генерация кода через бесплатный open-source AI
async function send() {
  const prompt = document.getElementById("prompt").value.trim();
  if(!prompt) return;

  addMessage(prompt, "user");
  document.getElementById("prompt").value = "";

  // Добавляем в память
  chatHistory.push({ role: "user", content: prompt });

  // Формируем контекст для AI
  let context = chatHistory.map(m => (m.role==="user"? "User: ":"AI: ") + m.content).join("\n") + "\nAI:";

  try {
    const res = await fetch("https://api-inference.huggingface.co/models/bigcode/starcoder", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ inputs: context })
    });

    const data = await res.json();
    const output = data[0]?.generated_text?.replace(context,"") || "Ошибка генерации";

    addMessage(output, "ai");
    chatHistory.push({ role:"ai", content: output });

    // Live preview
    document.getElementById("preview").srcdoc = output;

  } catch(e) {
    addMessage("Ошибка: " + e.message, "ai");
  }
}
</script>

</body>
</html>
